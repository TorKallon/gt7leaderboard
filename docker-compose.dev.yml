services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gt7leaderboard
      POSTGRES_USER: gt7
      POSTGRES_PASSWORD: gt7dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gt7 -d gt7leaderboard"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://gt7:gt7dev@postgres:5432/gt7leaderboard
      AUTH_SECRET: dev-secret-do-not-use-in-production-1234567890
      AUTH_URL: http://localhost:3001
      AUTH_TRUST_HOST: "true"
      INGEST_API_KEY: dev-ingest-key
      ALLOWED_DOMAIN: mcnamara.io
      ALLOWED_EMAILS: rourkem@rourkem.com
      # Leave GOOGLE_CLIENT_ID unset to skip OAuth in dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
