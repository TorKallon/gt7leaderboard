# GT7 Collector Configuration
# Copy this file to config.yaml and fill in your values.

playstation:
  ip: ""                       # PS5 IP address (leave empty for broadcast auto-discovery)
  send_port: 33739             # GT7 telemetry port (do not change)
  listen_port: 33740           # Local UDP listen port (do not change)

psn:
  npsso_token: ""              # Set via web UI at http://localhost:8080/auth
  accounts:
    - online_id: "Tor_Kallon"
      driver_name: "Tor_Kallon"
    - online_id: "ArcaneRadz"
      driver_name: "ArcaneRadz"

api:
  endpoint: "https://gt7.mcnamara.io"
  api_key: "71cc7c7bc693058ff68fd223d935b992c1768b55572926f0aa7cb61809a8589a"

discord:
  webhook_url: ""              # Discord webhook URL (optional)
  notify_overall_records: true
  notify_category_records: true
  notify_car_records: false

datadog:
  enabled: false
  api_key: ""
  site: "datadoghq.com"
  service: "gt7-collector"
  env: "production"

session:
  idle_timeout_seconds: 30
  track_detection_min_points: 300

data_refresh:
  car_data_base_url: "https://ddm999.github.io/gt7info"
  car_refresh_interval_hours: 24
  track_data_repo: "profittlich/gt7speedboard"
  track_refresh_interval_hours: 168
